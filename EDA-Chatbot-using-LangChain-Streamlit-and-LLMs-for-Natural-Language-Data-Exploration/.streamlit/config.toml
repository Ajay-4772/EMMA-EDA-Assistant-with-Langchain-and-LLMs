[server]
maxUploadSize = 1000
enableCORS = false
enableXsrfProtection = false

[client]
showErrorDetails = true

[browser]
gatherUsageStats = false

[theme]
primaryColor = "#FF6B6B"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"

[global]
developmentMode = false

[logger]
level = "info"